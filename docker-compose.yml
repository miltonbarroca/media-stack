name: media-stack
services:

  qbittorrent:
    profiles: ["no-vpn"]
    container_name: qbittorrent
    privileged: true
    image: lscr.io/linuxserver/qbittorrent:5.1.4
    networks:
      - mynetwork
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
      - WEBUI_PORT=5080
    ports:
      - 5080:5080
      - 6881:6881
      - 6881:6881/udp
    volumes:
      - qbittorrent-config:/config
      - /mnt/media/downloads:/downloads
    restart: unless-stopped

  radarr:
    profiles: ["no-vpn"]
    container_name: radarr
    image: lscr.io/linuxserver/radarr:latest
    networks:
      - mynetwork
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    ports:
      - 7878:7878
    volumes:
      - radarr-config:/config
      - /mnt/media/downloads:/downloads
      - /mnt/media/media:/media
    restart: unless-stopped

  sonarr:
    profiles: ["no-vpn"]
    container_name: sonarr
    image: linuxserver/sonarr:4.0.16
    networks:
      - mynetwork
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    ports:
      - 8989:8989
    volumes:
      - sonarr-config:/config
      - /mnt/media/downloads:/downloads
      - /mnt/media/media:/media
    restart: unless-stopped

  prowlarr:
    profiles: ["no-vpn"]
    container_name: prowlarr
    image: linuxserver/prowlarr:2.3.0
    networks:
      - mynetwork
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    ports:
      - 9696:9696
    volumes:
      - prowlarr-config:/config
    restart: unless-stopped

  jellyfin:
    profiles: ["no-vpn"]
    container_name: jellyfin
    image: linuxserver/jellyfin:10.11.6
    networks:
      - mynetwork
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    ports:
      - 8096:8096
      - 7359:7359/udp
      - 8920:8920
    volumes:
      - jellyfin-config:/config
      - /mnt/media:/data
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
    group_add:
      - "993" #render
      - "44" #video
    restart: unless-stopped

  bazarr:
    profiles: ["no-vpn"]
    container_name: bazarr
    image: lscr.io/linuxserver/bazarr:1.5.1
    networks:
      - mynetwork
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    volumes:
      - bazarr-config:/config
      - /mnt/media/downloads:/downloads
      - /mnt/media:/data
    ports:
      - 6767:6767
    restart: unless-stopped

  seerr:
    profiles: ["no-vpn"]
    container_name: seerr
    image: ghcr.io/seerr-team/seerr:latest
    networks:
      - mynetwork
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
      - PORT=5055
    volumes:
      - seerr-config:/app/config
    ports:
      - 5055:5055
    restart: unless-stopped

volumes:
  qbittorrent-config:
  radarr-config:
  sonarr-config:
  prowlarr-config:
  jellyfin-config:
  seerr-config:
  bazarr-config:

networks:
  mynetwork:
    external: true
